<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 工具导航站</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">你的 AI 导航站</div>
    <div class="tip">零基础也能维护</div>
  </header>

  <main class="container">
    <section class="hero">
      <h1>发现好用的 AI 工具</h1>
      <p>搜索、筛选并快速访问你常用的 AI 平台</p>
    </section>

    <section class="controls">
      <input id="searchInput" type="text" placeholder="输入工具名或描述关键词..." />
      <div id="categoryTabs" class="tabs"></div>
    </section>

    <section>
      <div id="resultMeta" class="result-meta"></div>
      <div id="toolGrid" class="tool-grid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>© <span id="year"></span> 你的 AI 导航站 · 仅供学习与分享</p>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
